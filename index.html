        document.getElementById('startBtn').addEventListener('click', async () => {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);
                
                isSystemReady = true;
                document.getElementById('startBtn').innerText = "✅ 麥克風已連接，請點擊下方播放";
                document.getElementById('startBtn').disabled = true;
                
                drawGame();
            } catch (err) {
                alert('⚠️ 哎呀！請確保瀏覽器允許麥克風權限！');
            }
        });

        function autoCorrelate(buf, sampleRate) {
            let SIZE = buf.length;
            let rms = 0;
            for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.02) return -1; 

            let r1 = 0, r2 = SIZE - 1, thres = 0.2;
            for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
            for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }
            buf = buf.slice(r1, r2);
            SIZE = buf.length;

            let c = new Array(SIZE).fill(0);
            for (let i = 0; i < SIZE; i++)
                for (let j = 0; j < SIZE - i; j++) c[i] = c[i] + buf[j] * buf[j + i];

            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < SIZE; i++) {
                if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            }
            return sampleRate / maxpos;
        }

        function drawGame() {
            if (!isSystemReady) return;

            requestAnimationFrame(drawGame);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);
            let currentPitch = autoCorrelate(buffer, audioContext.sampleRate);
            
            if (currentPitch !== -1) {
                pitchDisplay.innerText = Math.round(currentPitch);
            } else {
                pitchDisplay.innerText = "沒聲音";
            }

            let currentTime = audioPlayer.currentTime;

            // 🎯 畫橘色判定線
            const JUDGE_LINE = 150;
            ctx.strokeStyle = "rgba(255, 152, 0, 0.8)"; 
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(JUDGE_LINE, 0);
            ctx.lineTo(JUDGE_LINE, canvas.height);
            ctx.stroke();

            let activeNoteFound = false;

            rawNotes.forEach(note => {
                let targetHz = PITCH_MAP[note.pitch] || 350; 

                let noteX = JUDGE_LINE + (note.time - currentTime) * 150;
                let noteWidth = Math.max(note.duration * 150, 40); 
                
                // 動態排版：將 C4 到 C5 的頻率映射到畫面 Y 軸
                let noteY = canvas.height - ((targetHz - 150) / 400) * canvas.height;
                noteY = Math.max(30, Math.min(canvas.height - 60, noteY)); 

                let isActive = (currentTime >= note.time - 0.2) && (currentTime <= note.time + note.duration + 0.2);
                let isPast = currentTime > (note.time + note.duration + 0.2);

                // ======================================
                // 🎶 無視八度音的「跨八度對比黑科技」
                // ======================================
                if (isActive) {
                    activeNoteFound = true;
                    
                    if (currentPitch !== -1) {
                        // 利用對數計算比例，只要音名(Do/Re/Mi)對了，不管高低八度都會算對！
                        let ratio = currentPitch / targetHz;
                        let semitonesShift = Math.abs(12 * Math.log2(ratio));
                        
                        // 計算與標準音的半音誤差 (忽略八度)
                        let distanceToNoteClass = semitonesShift % 12;
                        if (distanceToNoteClass > 6) distanceToNoteClass = 12 - distanceToNoteClass;

                        // 容錯率設定：誤差在 2 個半音內都算對 (給小朋友滿滿的成就感！)
                        if (distanceToNoteClass <= 2.0) {
                            note.status = "hit";
                            hitStatus.innerText = "✨ 音準完美：『" + note.text + "』！";
                            hitStatus.style.color = "#4CAF50";
                        }
                    }

                    // 提示邏輯
                    if (note.status !== "hit") {
                        if (currentPitch === -1) {
                            hitStatus.innerText = "👀 該開口唱囉：『" + note.text + "』...";
                            hitStatus.style.color = "#FF9800";
                        } else {
                            hitStatus.innerText = "🔥 努力唱！尋找音準...";
                            hitStatus.style.color = "#FF5722";
                        }
                    }
                } else if (isPast) {
                    if (note.status !== "hit") note.status = "missed";
                }

                // 顏色鎖定
                if (note.status === "hit") {
                    ctx.fillStyle = "#81C784"; // 活力綠 
                } else if (note.status === "missed") {
                    ctx.fillStyle = "#E57373"; // 警示紅 
                } else {
                    ctx.fillStyle = "#FFD54F"; // 陽光黃 
                }

                // 畫出方塊
                ctx.beginPath();
                ctx.roundRect(noteX, noteY, noteWidth, 40, 10);
                ctx.fill();
                ctx.strokeStyle = "#333";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = "#212121";
                ctx.font = "bold 20px 'Microsoft JhengHei', sans-serif";
                ctx.fillText(note.text, noteX + 10, noteY + 28);
            });

            if (!activeNoteFound && !audioPlayer.paused) {
                hitStatus.innerText = "🎵 準備迎接下一個音符...";
                hitStatus.style.color = "#607D8B";
            }
        }
